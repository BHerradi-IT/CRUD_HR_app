version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:17
    container_name: crud_hr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ytech_hr}
      POSTGRES_USER: ${POSTGRES_USER:-hr_app_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-LocalPostgres12345!}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - crud_hr_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - hr_network

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: crud_hr_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - crud_hr_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - hr_network

  # Django Application
  web:
    build: .
    image: peacechouaib/crud_hr_app:latest
    container_name: crud_hr_web
    restart: unless-stopped
    command: gunicorn hr_core.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2
    volumes:
      - ./backend:/app/backend
      - ./config:/app/config
      - static_files:/app/backend/staticfiles
      - media_files:/app/backend/media
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=hr_core.settings
      - SECRET_KEY=${SECRET_KEY:-django-insecure-production-key-change-me}
      - DEBUG=${DEBUG:-False}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - DB_NAME=${POSTGRES_DB:-ytech_hr}
      - DB_USER=${POSTGRES_USER:-hr_app_user}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-LocalPostgres12345!}
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - hr_network

  # Nginx for static files and reverse proxy
  nginx:
    image: nginx:alpine
    container_name: crud_hr_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/static:ro
      - media_files:/media:ro
    depends_on:
      - web
    networks:
      - hr_network

  # Celery worker for background tasks
  celery:
    build: .
    image: peacechouaib/crud_hr_app:celery
    container_name: crud_hr_celery
    restart: unless-stopped
    command: celery -A hr_core worker --loglevel=info
    environment:
      - DJANGO_SETTINGS_MODULE=hr_core.settings
      - DB_NAME=${POSTGRES_DB:-ytech_hr}
      - DB_USER=${POSTGRES_USER:-hr_app_user}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-LocalPostgres12345!}
      - DB_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hr_network

  # Celery beat for scheduled tasks
  celery-beat:
    build: .
    image: peacechouaib/crud_hr_app:celery-beat
    container_name: crud_hr_celery_beat
    restart: unless-stopped
    command: celery -A hr_core beat --loglevel=info
    environment:
      - DJANGO_SETTINGS_MODULE=hr_core.settings
      - DB_NAME=${POSTGRES_DB:-ytech_hr}
      - DB_USER=${POSTGRES_USER:-hr_app_user}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-LocalPostgres12345!}
      - DB_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      - celery
    networks:
      - hr_network

  # PgAdmin for database management (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: crud_hr_pgadmin
    restart: unless-stopped
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:-admin@example.com}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:-admin123}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - hr_network
    profiles:
      - dev

volumes:
  crud_hr_postgres_data:
  crud_hr_redis_data:
  static_files:
  media_files:

networks:
  hr_network:
    driver: bridge
